# Release workflow
#
# Triggered when you push a tag matching v* (e.g. v2.0.1, v2.1.0-beta.3).
# Builds the Electron app for macOS + Windows in parallel, then
# publishes the artefacts to a GitHub Release on this repo.
#
# How to cut a release from your laptop:
#   1. Bump version in package.json:   "version": "2.0.1"
#   2. Commit:                         git commit -am "Release v2.0.1"
#   3. Tag:                            git tag v2.0.1
#   4. Push both:                      git push origin main --tags
#
# The workflow picks up the tag, builds, and publishes. electron-updater
# in the app will then detect the new release at its next check and
# prompt the user to install.
#
# electron-builder reads GH_TOKEN from the environment to talk to the
# GitHub API. We feed it the ambient GITHUB_TOKEN that Actions provides
# automatically — no need for a personal access token.

name: Release

on:
  push:
    tags:
      - "v*"

# The default GITHUB_TOKEN needs `contents: write` to create releases
# and upload assets. Declare it explicitly so the workflow keeps
# working if the repo-wide default is later tightened.
permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        # .npmrc pins legacy-peer-deps=true to work around the
        # Primer v36 + React 19 peer-dep mismatch (yarn honors .npmrc).

      - name: Build & publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn package:mac --publish always

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn package:win --publish always
